<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>daywise</title>
    <!--
      GitHub Pages SPA redirect (rafgraph/spa-github-pages).
      Rewrites a deep-link 404 into a query the app can restore on load.
      pathSegmentsToKeep = 1 because the site is served under /project-daybook-website/.
    -->
    <script>
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
